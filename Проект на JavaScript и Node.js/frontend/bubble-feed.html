<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Информационный пузырь - CyberShop</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .bubble-panel {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            border: 2px solid #0f3460;
        }
        .bubble-status {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .radical-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        .radical-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #e74c3c);
            transition: width 0.3s;
        }
        .topic-tag {
            background: #2c3e50;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin: 5px;
        }
        .topic-tag.high {
            background: #e74c3c;
        }
        .break-mode {
            background: #4a0000;
            border: 2px solid red;
        }
        .event-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff9800;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.5s;
            max-width: 350px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .comparison-view {
            display: flex;
            gap: 20px;
            margin: 20px;
        }
        .user-bubble {
            flex: 1;
            background: #0a0a0a;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
        }
        .recommended-badge {
            background: #4ecdc4;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 10px;
        }
        .product-card {
            background: #131725;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            transition: 0.2s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.3);
        }
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 10px 0;
        }
        .product-tag {
            background: #2c3e50;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-small {
            padding: 5px 12px;
            font-size: 12px;
        }
        .btn-like {
            background: #e74c3c;
            border-color: #e74c3c;
        }
        .btn-like:hover {
            background: #c0392b;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <a href="/" class="logo">CYBER SHOP</a>
        <div class="nav-links">
            <a href="/">Главная</a>
            <a href="/cart.html">Корзина</a>
            <a href="/orders.html">Заказы</a>
            <a href="/bubble-feed.html" style="color: #4ecdc4;">ИНФОПУЗЫРЬ</a>
            <a href="/login.html">Войти</a>
            <a href="/register.html">Регистрация</a>
        </div>
        <div id="userInfo"></div>
    </div>
</div>

<div class="bubble-panel" id="bubblePanel">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h3>ИНФОРМАЦИОННЫЙ ПУЗЫРЬ</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button onclick="toggleComparison()" id="compareBtn" class="reset-btn">Сравнить пользователей</button>
            <button onclick="breakBubble()" id="breakBtn" class="reset-btn" style="background: #e74c3c;">Сломать пузырь (15 сек)</button>
            <button onclick="triggerRandomEvent()" class="reset-btn">Случайное событие</button>
            <button onclick="resetBubble()" class="reset-btn" style="background: #6c3483;">Сбросить пузырь</button>
        </div>
    </div>
    
    <div id="bubbleStatus" class="bubble-status">
        <div>Загрузка данных пузыря...</div>
        <div class="radical-bar"><div class="radical-fill" style="width: 0%"></div></div>
    </div>
    
    <div id="topicPreferences" style="margin-top: 15px;"></div>
    
    <div id="algorithmInfo" style="font-size: 12px; color: #888; margin-top: 10px;">
        Скрытые алгоритмы активны: персонализация ленты на основе ваших действий
    </div>
</div>

<div id="comparisonView" style="display: none;">
    <div class="comparison-view">
        <div class="user-bubble" id="userABubble">
            <h3>ВЫ</h3>
            <div id="userAPrefs"></div>
            <div id="userAStats"></div>
        </div>
        <div class="user-bubble" id="userBBubble">
            <h3>ТИПОВОЙ ПОЛЬЗОВАТЕЛЬ</h3>
            <div id="userBPrefs"></div>
            <div id="userBStats"></div>
        </div>
    </div>
</div>

<div class="filter-section">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск товаров в ленте..." onkeyup="filterFeed()">
    </div>
    <div style="margin-top: 10px;">
        <label><input type="checkbox" id="forceRandomCheckbox" onchange="toggleRandomMode()"> Случайный режим (игнорировать пузырь)</label>
    </div>
</div>

<div id="products" class="content-card" style="flex-direction: column; align-items: stretch;"></div>

<footer>
    <p>2026 Cyber Shop</p>
</footer>

<script src="/bubble-feed.js"></script>
</body>
</html>
